<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>$PMUSH LILLY PAD HOP</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        :root {
            --accent: #00ffcc;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Press Start 2P', system-ui;
            color: white;
            touch-action: none;
        }
        
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #001122, #000000);
        }
        
        canvas {
            display: block;
            background: #001122;
            max-width: 100vw;
            max-height: 100vh;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.4);
        }
        
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        
        .screen {
            pointer-events: auto;
            background: rgba(0, 17, 34, 0.95);
            border: 8px solid var(--accent);
            border-radius: 20px;
            padding: 30px 20px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.6);
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 20px;
            color: var(--accent);
            text-shadow: 0 0 15px var(--accent);
        }
        
        button {
            font-family: 'Press Start 2P', system-ui;
            font-size: 18px;
            background: #001122;
            color: white;
            border: 6px solid var(--accent);
            padding: 15px 30px;
            margin: 10px;
            width: 100%;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
        }
        
        button:active {
            transform: scale(0.95);
            background: var(--accent);
            color: #001122;
        }
        
        .leaderboard {
            max-height: 320px;
            overflow-y: auto;
            background: #001122;
            border: 4px solid var(--accent);
            padding: 10px;
            margin: 15px 0;
            text-align: left;
            font-size: 14px;
        }
        
        .leaderboard li {
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid #003344;
        }
        
        .leaderboard li:last-child { border-bottom: none; }
        
        .score { color: var(--accent); }
        
        #pause-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 32px;
            background: none;
            border: none;
            color: white;
            z-index: 100;
            pointer-events: auto;
            text-shadow: 0 0 10px var(--accent);
            display: none;
        }
        
        .small-btn {
            font-size: 14px;
            padding: 10px 20px;
            width: auto;
            display: inline-block;
        }
        
        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 17, 34, 0.98);
            border: 8px solid var(--accent);
            padding: 25px;
            border-radius: 15px;
            width: 85%;
            max-width: 340px;
            z-index: 200;
            display: none;
        }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="canvas" width="400" height="700"></canvas>
        
        <!-- MAIN MENU -->
        <div id="main-menu" class="ui-overlay">
            <div class="screen">
                <h1>$PMUSH<br>LILLY PAD HOP</h1>
                <p style="font-size:12px; margin-bottom:30px; opacity:0.8;">TO THE MOON 🌕</p>
                
                <button id="btn-play">PLAY</button>
                <button id="btn-leaderboard">LEADERBOARD</button>
                <button id="btn-cap">CHOOSE CAP</button>
                <button id="btn-username">SET USERNAME</button>
                
                <div style="margin-top:40px; font-size:11px; opacity:0.6;">
                    HIGH SCORE: <span id="high-score-display" style="color:#00ffcc;">0</span>
                </div>
            </div>
        </div>
        
        <!-- CAP SELECT -->
        <div id="cap-screen" class="ui-overlay" style="display:none;">
            <div class="screen">
                <h1>CHOOSE CAP</h1>
                <div style="display:flex; justify-content:space-around; margin:25px 0; flex-wrap:wrap; gap:15px;">
                    <div onclick="selectCap(0)" style="cursor:pointer; text-align:center;">
                        <div id="cap-preview-0" style="width:70px;height:70px;margin:0 auto 8px; border:4px solid #00ffcc; border-radius:50%; background:#4b9cd3;"></div>
                        <div style="font-size:12px;">BLUE</div>
                    </div>
                    <div onclick="selectCap(1)" style="cursor:pointer; text-align:center;">
                        <div id="cap-preview-1" style="width:70px;height:70px;margin:0 auto 8px; border:4px solid #00ffcc; border-radius:50%; background:#ff6699;"></div>
                        <div style="font-size:12px;">PINK</div>
                    </div>
                    <div onclick="selectCap(2)" style="cursor:pointer; text-align:center;">
                        <div id="cap-preview-2" style="width:70px;height:70px;margin:0 auto 8px; border:4px solid #00ffcc; border-radius:50%; background:#ccff33;"></div>
                        <div style="font-size:12px;">NEON</div>
                    </div>
                </div>
                
                <button onclick="backToMenu()" class="small-btn">BACK</button>
                <button onclick="startFromCap()" style="margin-left:10px;">START JUMPING</button>
            </div>
        </div>
        
        <!-- LEADERBOARD -->
        <div id="leaderboard-screen" class="ui-overlay" style="display:none;">
            <div class="screen">
                <h1>LEADERBOARD</h1>
                <div id="leaderboard-list" class="leaderboard">
                    <!-- populated by JS -->
                </div>
                <button onclick="backToMenu()" class="small-btn">BACK TO MENU</button>
            </div>
        </div>
        
        <!-- PAUSE MENU -->
        <div id="pause-menu" class="ui-overlay" style="display:none;">
            <div class="screen">
                <h1>PAUSED</h1>
                <button onclick="resumeGame()">RESUME</button>
                <button onclick="quitToMenu()">QUIT</button>
            </div>
        </div>
        
        <!-- GAME OVER -->
        <div id="gameover-screen" class="ui-overlay" style="display:none;">
            <div class="screen">
                <h1>GAME OVER</h1>
                <div style="margin:20px 0; font-size:18px;">
                    SCORE: <span id="final-score" style="color:#00ffcc; font-size:24px;">0</span>
                </div>
                
                <div style="margin-bottom:20px;">
                    <input id="username-input" type="text" placeholder="YOUR NAME" maxlength="12" 
                           style="width:100%; padding:12px; font-size:16px; background:#001122; border:4px solid #00ffcc; color:white; text-align:center;">
                </div>
                
                <button onclick="submitScore()">SUBMIT SCORE</button>
                <button onclick="viewLeaderboardFromOver()">VIEW LEADERBOARD</button>
                <button onclick="playAgain()">PLAY AGAIN</button>
                <button onclick="shareScore()" class="small-btn" style="margin-top:10px;">SHARE ON X</button>
                <button onclick="quitToMenu()" class="small-btn">MENU</button>
            </div>
        </div>
        
        <!-- Pause button (visible only in game) -->
        <button id="pause-btn" onclick="pauseGame()">⏸</button>
    </div>

    <script>
        // =============================================
        // ALL VARIABLES DECLARED AT THE TOP - CLEAN & RELIABLE
        // =============================================
        
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: true });
        
        const WIDTH = 400;
        const HEIGHT = 700;
        
        // Game state
        let gameState = 'menu'; // menu, playing, paused, gameover, capselect
        let score = 0;
        let highScore = 0;
        let username = 'Guest';
        let selectedCap = 0; // 0=blue, 1=pink, 2=neon
        
        // Player
        let player = {
            x: WIDTH / 2,
            y: HEIGHT * 0.75,
            vx: 0,
            vy: 0,
            width: 44,
            height: 52,
            onGround: false,
            jetpackTime: 0,
            magnetTime: 0,
            capColor: '#4b9cd3'
        };
        
        // World
        let platforms = [];
        let powerups = [];
        let particles = [];
        let cameraY = 0;
        let maxHeightReached = 0;
        
        // Controls
        let movingLeft = false;
        let movingRight = false;
        
        // Background
        let bgLevel = 0;
        let scrollTextX = WIDTH;
        
        // Leaderboard
        let leaderboard = [];
        
        // Timers & flags
        let lastTime = 0;
        let frame = 0;
        let gameLoopId = null;
        
        // Touch scaling helpers
        let touchScaleX = 1;
        let touchScaleY = 1;
        
        // =============================================
        // LOCALSTORAGE - Leaderboard & Username
        // =============================================
        function loadData() {
            const savedUser = localStorage.getItem('pmush_username');
            if (savedUser) username = savedUser;
            
            const savedLB = localStorage.getItem('pmush_leaderboard');
            if (savedLB) leaderboard = JSON.parse(savedLB);
            
            const savedHS = localStorage.getItem('pmush_highscore');
            if (savedHS) highScore = parseInt(savedHS);
            
            document.getElementById('high-score-display').textContent = highScore;
        }
        
        function saveLeaderboard() {
            leaderboard.sort((a, b) => b.score - a.score);
            leaderboard = leaderboard.slice(0, 10);
            localStorage.setItem('pmush_leaderboard', JSON.stringify(leaderboard));
            localStorage.setItem('pmush_highscore', highScore);
        }
        
        // =============================================
        // INIT GAME - Called every time PLAY is pressed (100% reliable)
        // =============================================
        function initGame() {
            // Reset everything instantly
            player.x = WIDTH / 2;
            player.y = HEIGHT * 0.7;
            player.vx = 0;
            player.vy = -18; // instant first jump
            player.jetpackTime = 0;
            player.magnetTime = 0;
            
            cameraY = 0;
            score = 0;
            maxHeightReached = player.y;
            bgLevel = 0;
            scrollTextX = WIDTH;
            
            platforms = [];
            powerups = [];
            particles = [];
            
            // Generate initial platforms (always the same reliable pattern)
            for (let i = 0; i < 18; i++) {
                platforms.push({
                    x: Math.random() * (WIDTH - 90) + 20,
                    y: HEIGHT - (i * 42) - 30,
                    w: 82 + Math.random() * 12,
                    active: true
                });
            }
            
            // First power-up
            powerups.push({
                x: platforms[3].x + 20,
                y: platforms[3].y - 22,
                type: 'coin',
                collected: false
            });
            
            movingLeft = false;
            movingRight = false;
            gameState = 'playing';
            
            // Show pause button instantly
            document.getElementById('pause-btn').style.display = 'block';
            
            // Hide all screens
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('cap-screen').style.display = 'none';
            document.getElementById('leaderboard-screen').style.display = 'none';
            document.getElementById('pause-menu').style.display = 'none';
            document.getElementById('gameover-screen').style.display = 'none';
            
            console.log('%c$PMUSH game started instantly', 'color:#00ffcc;font-family:monospace');
        }
        
        // =============================================
        // UPDATE - Physics & logic (60fps locked)
        // =============================================
        function update() {
            if (gameState !== 'playing') return;
            
            frame++;
            
            // Player physics
            player.vy += 0.48; // gravity
            player.x += player.vx;
            
            // Side wrap-around
            if (player.x < -player.width / 2) player.x = WIDTH + player.width / 2;
            if (player.x > WIDTH + player.width / 2) player.x = -player.width / 2;
            
            // Horizontal movement from touch
            const speed = 6.5;
            if (movingLeft) player.vx = Math.max(player.vx - 1.2, -speed);
            if (movingRight) player.vx = Math.min(player.vx + 1.2, speed);
            if (!movingLeft && !movingRight) player.vx *= 0.88; // natural slowdown
            
            // Jetpack
            if (player.jetpackTime > 0) {
                player.jetpackTime--;
                player.vy = Math.max(player.vy - 2.2, -18);
            }
            
            // Magnet
            if (player.magnetTime > 0) player.magnetTime--;
            
            // Platform collision & generation
            player.onGround = false;
            for (let i = platforms.length - 1; i >= 0; i--) {
                const p = platforms[i];
                if (!p.active) continue;
                
                // Collision
                if (
                    player.vy > 0 &&
                    player.x + player.width / 2 > p.x &&
                    player.x - player.width / 2 < p.x + p.w &&
                    player.y + player.height / 2 > p.y &&
                    player.y + player.height / 2 - player.vy < p.y
                ) {
                    player.y = p.y - player.height / 2;
                    player.vy = -15.5 - (score / 1200); // progressive jump power
                    player.onGround = true;
                    
                    // Particle jump burst
                    for (let k = 0; k < 14; k++) {
                        particles.push({
                            x: player.x + (Math.random() * 30 - 15),
                            y: player.y + player.height / 2,
                            vx: (Math.random() - 0.5) * 4,
                            vy: Math.random() * 3 + 2,
                            life: 22,
                            color: '#00ff88'
                        });
                    }
                }
                
                // Remove platforms that are way below
                if (p.y > cameraY + HEIGHT + 100) {
                    platforms.splice(i, 1);
                }
            }
            
            // Generate new platforms at top (progressive spacing)
            const spacing = 38 + Math.min(28, Math.floor(score / 800));
            while (platforms.length < 19) {
                const lastY = platforms.length ? Math.min(...platforms.map(p => p.y)) : cameraY - 50;
                platforms.push({
                    x: Math.random() * (WIDTH - 90) + 20,
                    y: lastY - spacing - Math.random() * 8,
                    w: 78 + Math.random() * 18,
                    active: true
                });
                
                // Random power-up on new platform (rare)
                if (Math.random() < 0.17) {
                    const typeRoll = Math.random();
                    powerups.push({
                        x: platforms[platforms.length - 1].x + platforms[platforms.length - 1].w / 2 - 12,
                        y: platforms[platforms.length - 1].y - 28,
                        type: typeRoll < 0.5 ? 'coin' : typeRoll < 0.8 ? 'jetpack' : 'magnet',
                        collected: false
                    });
                }
            }
            
            // Power-up collection
            for (let i = powerups.length - 1; i >= 0; i--) {
                const pu = powerups[i];
                if (pu.collected) continue;
                
                const dx = player.x - pu.x;
                const dy = player.y + 10 - pu.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                // Magnet pull
                if (player.magnetTime > 0 && pu.type === 'coin' && dist < 120) {
                    pu.x += dx * 0.18;
                    pu.y += dy * 0.18;
                }
                
                if (dist < 38) {
                    pu.collected = true;
                    
                    if (pu.type === 'coin') {
                        score += 25;
                        // coin burst
                        for (let k = 0; k < 8; k++) {
                            particles.push({
                                x: pu.x,
                                y: pu.y,
                                vx: (Math.random() - 0.5) * 6,
                                vy: (Math.random() - 0.5) * 6 - 2,
                                life: 18,
                                color: '#ffee00'
                            });
                        }
                    } else if (pu.type === 'jetpack') {
                        player.jetpackTime = 220;
                    } else if (pu.type === 'magnet') {
                        player.magnetTime = 380;
                    }
                }
            }
            
            // Remove collected powerups
            powerups = powerups.filter(p => !p.collected || p.y > cameraY - 100);
            
            // Camera follow
            if (player.vy < 0 && player.y < HEIGHT * 0.32) {
                const scrollAmount = HEIGHT * 0.32 - player.y;
                player.y = HEIGHT * 0.32;
                cameraY -= scrollAmount;
                
                // Score based on height
                const newHeight = Math.floor(-cameraY / 3);
                if (newHeight > score) score = newHeight;
                
                // Background level
                const newBgLevel = Math.floor(score / 5000);
                if (newBgLevel > bgLevel) {
                    bgLevel = newBgLevel;
                }
            }
            
            // Max height tracking
            if (player.y + cameraY < maxHeightReached) {
                maxHeightReached = player.y + cameraY;
            }
            
            // Game over condition - fell too far
            if (player.y > cameraY + HEIGHT + 80) {
                endGame();
                return;
            }
            
            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.15;
                p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }
            
            // Scroll text
            scrollTextX -= 2.8;
            if (scrollTextX < -320) scrollTextX = WIDTH + 80;
        }
        
        // =============================================
        // DRAW - Everything rendered here
        // =============================================
        function draw() {
            ctx.clearRect(0, 0, WIDTH, HEIGHT);
            
            // Background gradient (changes every 5000 pts)
            const hue = 195 + (bgLevel * 18) % 120;
            const grad = ctx.createLinearGradient(0, 0, 0, HEIGHT);
            grad.addColorStop(0, `hsl(${hue}, 70%, 12%)`);
            grad.addColorStop(1, `hsl(${hue + 30}, 90%, 4%)`);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, WIDTH, HEIGHT);
            
            // Background stars / moon dots
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            for (let i = 0; i < 42; i++) {
                const x = ((i * 31 + frame * 0.3) % WIDTH);
                const y = ((i * 17) % (HEIGHT + cameraY * 0.1)) - (cameraY * 0.1);
                const size = (i % 5 === 0) ? 2.5 : 1.2;
                ctx.fillRect(x, y, size, size);
            }
            
            // Scrolling text "$PMUSH TO THE MOON"
            ctx.save();
            ctx.font = 'bold 22px "Press Start 2P"';
            ctx.fillStyle = 'rgba(255,255,255,0.25)';
            ctx.shadowBlur = 12;
            ctx.shadowColor = '#00ffcc';
            ctx.fillText('$PMUSH TO THE MOON 🌕', scrollTextX, 80 + (bgLevel % 3) * 12);
            ctx.restore();
            
            // Draw platforms (lily pads)
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#00cc66';
            for (let p of platforms) {
                if (!p.active) continue;
                const screenY = p.y - cameraY;
                if (screenY < -60 || screenY > HEIGHT + 60) continue;
                
                // Lily pad body
                ctx.fillStyle = '#00cc66';
                ctx.beginPath();
                ctx.ellipse(p.x + p.w / 2, screenY + 8, p.w / 2 + 4, 14, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Darker edge
                ctx.fillStyle = '#008844';
                ctx.beginPath();
                ctx.ellipse(p.x + p.w / 2, screenY + 8, p.w / 2 + 2, 10, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Lines for lily pad texture
                ctx.strokeStyle = '#004422';
                ctx.lineWidth = 3;
                for (let k = 1; k < 4; k++) {
                    ctx.beginPath();
                    ctx.moveTo(p.x + 10, screenY + 8);
                    ctx.quadraticCurveTo(
                        p.x + p.w / 2,
                        screenY + 8 - (k * 4),
                        p.x + p.w - 10,
                        screenY + 8
                    );
                    ctx.stroke();
                }
            }
            ctx.shadowBlur = 0;
            
            // Draw power-ups
            for (let pu of powerups) {
                const sy = pu.y - cameraY;
                if (sy < -40 || sy > HEIGHT + 40) continue;
                
                if (pu.type === 'coin') {
                    ctx.fillStyle = '#ffee00';
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#ffee00';
                    ctx.beginPath();
                    ctx.arc(pu.x, sy, 14, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#ccaa00';
                    ctx.font = 'bold 18px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('¢', pu.x, sy + 6);
                } else if (pu.type === 'jetpack') {
                    ctx.fillStyle = '#ff4400';
                    ctx.fillRect(pu.x - 10, sy - 8, 20, 26);
                    ctx.fillStyle = '#ffee00';
                    ctx.fillRect(pu.x - 14, sy + 14, 28, 8);
                } else if (pu.type === 'magnet') {
                    ctx.strokeStyle = '#aa00ff';
                    ctx.lineWidth = 6;
                    ctx.beginPath();
                    ctx.arc(pu.x, sy, 18, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.fillStyle = '#aa00ff';
                    ctx.fillRect(pu.x - 6, sy - 6, 12, 12);
                }
            }
            
            // Particles
            for (let p of particles) {
                const alpha = p.life / 22;
                ctx.globalAlpha = alpha;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y - cameraY, 4, 4);
            }
            ctx.globalAlpha = 1;
            
            // Draw $PMUSH character
            const py = player.y - cameraY;
            
            ctx.save();
            ctx.translate(player.x, py);
            
            // Slight tilt based on velocity
            const tilt = Math.max(-0.6, Math.min(0.6, player.vx * 0.025));
            ctx.rotate(tilt);
            
            // Robe (purplish mystical)
            ctx.fillStyle = '#6b2fc2';
            ctx.beginPath();
            ctx.moveTo(-18, 18);
            ctx.lineTo(-22, 42);
            ctx.lineTo(22, 42);
            ctx.lineTo(18, 18);
            ctx.closePath();
            ctx.fill();
            
            // Robe highlight
            ctx.fillStyle = '#9b5fe8';
            ctx.fillRect(-14, 20, 8, 18);
            
            // Mushroom stem
            ctx.fillStyle = '#f0f0d8';
            ctx.fillRect(-11, -8, 22, 30);
            
            // Cap base
            ctx.fillStyle = player.capColor;
            ctx.beginPath();
            ctx.ellipse(0, -18, 26, 18, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Cap top highlight
            ctx.fillStyle = 'rgba(255,255,255,0.35)';
            ctx.beginPath();
            ctx.ellipse(-6, -26, 14, 9, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // White spots on cap
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(-14, -24, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(12, -22, 3.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(-4, -14, 5, 0, Math.PI * 2);
            ctx.fill();
            
            // Purple triangle 3rd eye (glowing)
            ctx.shadowBlur = 14;
            ctx.shadowColor = '#cc66ff';
            ctx.fillStyle = '#cc66ff';
            ctx.beginPath();
            ctx.moveTo(-6, -34);
            ctx.lineTo(6, -34);
            ctx.lineTo(0, -24);
            ctx.closePath();
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Inner glowing eye dot
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(-2, -30, 4, 4);
            
            // Pepe-style face (smirk + eyes)
            // Eyes
            ctx.fillStyle = '#222222';
            ctx.fillRect(-13, -20, 7, 8); // left eye
            ctx.fillRect(6, -20, 7, 8);   // right eye
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(-11, -18, 3, 3);
            ctx.fillRect(8, -18, 3, 3);
            
            // Smirk mouth
            ctx.strokeStyle = '#222222';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.moveTo(-9, -8);
            ctx.quadraticCurveTo(0, -3, 9, -8);
            ctx.stroke();
            
            // Jetpack flame when active
            if (player.jetpackTime > 0) {
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#ff8800';
                ctx.fillStyle = '#ffcc00';
                ctx.beginPath();
                ctx.moveTo(-12, 38);
                ctx.lineTo(-4, 52 + Math.sin(frame / 2) * 6);
                ctx.lineTo(12, 38);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
            
            ctx.restore();
            
            // Score HUD
            ctx.fillStyle = 'white';
            ctx.font = 'bold 22px "Press Start 2P"';
            ctx.textAlign = 'left';
            ctx.fillText('' + Math.floor(score), 22, 48);
            
            // Magnet icon when active
            if (player.magnetTime > 0) {
                ctx.fillStyle = '#aa00ff';
                ctx.font = '20px Arial';
                ctx.fillText('🧲', WIDTH - 64, 48);
            }
            
            // Current username tiny
            ctx.font = '10px "Press Start 2P"';
            ctx.fillStyle = '#00ffcc';
            ctx.textAlign = 'right';
            ctx.fillText(username.toUpperCase(), WIDTH - 22, 48);
        }
        
        // =============================================
        // MAIN GAME LOOP - requestAnimationFrame
        // =============================================
        function loop(timestamp) {
            if (!lastTime) lastTime = timestamp;
            const delta = timestamp - lastTime;
            
            if (delta > 16) { // ~60fps
                update();
                draw();
                lastTime = timestamp;
            }
            
            gameLoopId = requestAnimationFrame(loop);
        }
        
        // =============================================
        // GAME OVER
        // =============================================
        function endGame() {
            cancelAnimationFrame(gameLoopId);
            gameState = 'gameover';
            document.getElementById('pause-btn').style.display = 'none';
            
            if (score > highScore) highScore = score;
            
            document.getElementById('final-score').textContent = Math.floor(score);
            const input = document.getElementById('username-input');
            input.value = username;
            
            document.getElementById('gameover-screen').style.display = 'flex';
        }
        
        function submitScore() {
            const inputName = document.getElementById('username-input').value.trim() || 'Guest';
            username = inputName;
            localStorage.setItem('pmush_username', username);
            
            leaderboard.push({ name: username, score: Math.floor(score) });
            saveLeaderboard();
            
            document.getElementById('gameover-screen').style.display = 'none';
            showLeaderboard();
        }
        
        function playAgain() {
            document.getElementById('gameover-screen').style.display = 'none';
            initGame();
            lastTime = 0;
            requestAnimationFrame(loop);
        }
        
        // =============================================
        // UI BUTTON HANDLERS
        // =============================================
        function startGame() {
            initGame();
            lastTime = 0;
            requestAnimationFrame(loop);
        }
        
        function startFromCap() {
            // Update cap color
            const colors = ['#4b9cd3', '#ff6699', '#ccff33'];
            player.capColor = colors[selectedCap];
            document.getElementById('cap-screen').style.display = 'none';
            startGame();
        }
        
        function selectCap(n) {
            selectedCap = n;
            // Highlight selected
            document.querySelectorAll('#cap-screen > div > div > div').forEach((el, i) => {
                el.style.border = i === n ? '8px solid #00ffcc' : '4px solid #00ffcc';
            });
        }
        
        function backToMenu() {
            document.getElementById('cap-screen').style.display = 'none';
            document.getElementById('leaderboard-screen').style.display = 'none';
            document.getElementById('main-menu').style.display = 'flex';
        }
        
        function pauseGame() {
            if (gameState !== 'playing') return;
            gameState = 'paused';
            cancelAnimationFrame(gameLoopId);
            document.getElementById('pause-btn').style.display = 'none';
            document.getElementById('pause-menu').style.display = 'flex';
        }
        
        function resumeGame() {
            document.getElementById('pause-menu').style.display = 'none';
            gameState = 'playing';
            document.getElementById('pause-btn').style.display = 'block';
            lastTime = 0;
            requestAnimationFrame(loop);
        }
        
        function quitToMenu() {
            cancelAnimationFrame(gameLoopId);
            gameState = 'menu';
            document.getElementById('pause-menu').style.display = 'none';
            document.getElementById('gameover-screen').style.display = 'none';
            document.getElementById('pause-btn').style.display = 'none';
            document.getElementById('main-menu').style.display = 'flex';
        }
        
        function showLeaderboard() {
            const container = document.getElementById('leaderboard-list');
            container.innerHTML = '<ul style="list-style:none;padding:0;margin:0;">';
            
            leaderboard.forEach((entry, i) => {
                container.innerHTML += `
                    <li>
                        <span>#${i + 1} ${entry.name}</span>
                        <span class="score">${entry.score}</span>
                    </li>`;
            });
            
            if (leaderboard.length === 0) {
                container.innerHTML += '<li style="text-align:center;opacity:0.5;padding:20px;">NO SCORES YET — BE THE FIRST!</li>';
            }
            container.innerHTML += '</ul>';
            
            document.getElementById('leaderboard-screen').style.display = 'flex';
            document.getElementById('main-menu').style.display = 'none';
        }
        
        function viewLeaderboardFromOver() {
            document.getElementById('gameover-screen').style.display = 'none';
            showLeaderboard();
        }
        
        function shareScore() {
            const text = `I just scored ${Math.floor(score)} in $PMUSH LILLY PAD HOP! 🌕 Can you beat me?`;
            const url = `https://x.com/intent/tweet?text=${encodeURIComponent(text)}`;
            window.open(url, '_blank');
        }
        
        // =============================================
        // TOUCH CONTROLS - Mobile-first
        // =============================================
        function handleTouch(e) {
            if (gameState !== 'playing') return;
            e.preventDefault();
            
            const rect = canvas.getBoundingClientRect();
            touchScaleX = WIDTH / rect.width;
            touchScaleY = HEIGHT / rect.height;
            
            for (let touch of e.touches) {
                const tx = (touch.clientX - rect.left) * touchScaleX;
                
                if (tx < WIDTH / 2) {
                    movingLeft = true;
                    movingRight = false;
                } else {
                    movingRight = true;
                    movingLeft = false;
                }
            }
        }
        
        function handleTouchEnd(e) {
            if (gameState !== 'playing') return;
            e.preventDefault();
            movingLeft = false;
            movingRight = false;
        }
        
        // Username button
        function setUsername() {
            const newName = prompt('ENTER YOUR NAME (max 12 chars)', username);
            if (newName && newName.trim()) {
                username = newName.trim().slice(0, 12);
                localStorage.setItem('pmush_username', username);
            }
        }
        
        // =============================================
        // START THE WHOLE THING - Instant on load
        // =============================================
        function launch() {
            canvas.width = WIDTH;
            canvas.height = HEIGHT;
            
            loadData();
            
            // Attach listeners
            document.getElementById('btn-play').addEventListener('click', startGame);
            document.getElementById('btn-leaderboard').addEventListener('click', showLeaderboard);
            document.getElementById('btn-cap').addEventListener('click', () => {
                document.getElementById('main-menu').style.display = 'none';
                document.getElementById('cap-screen').style.display = 'flex';
            });
            document.getElementById('btn-username').addEventListener('click', setUsername);
            
            // Touch
            canvas.addEventListener('touchstart', handleTouch, { passive: false });
            canvas.addEventListener('touchmove', handleTouch, { passive: false });
            canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
            canvas.addEventListener('touchcancel', handleTouchEnd, { passive: false });
            
            // Show main menu instantly
            document.getElementById('main-menu').style.display = 'flex';
            
            // Canvas is already drawn once so no black screen ever
            ctx.fillStyle = '#001122';
            ctx.fillRect(0, 0, WIDTH, HEIGHT);
            ctx.fillStyle = '#00ffcc';
            ctx.font = 'bold 28px "Press Start 2P"';
            ctx.textAlign = 'center';
            ctx.fillText('$PMUSH', WIDTH / 2, HEIGHT / 2 - 30);
            
            console.log('%c✅ $PMUSH LILLY PAD HOP ready - always launches instantly', 'color:#00ffcc;font-size:13px');
        }
        
        // Fire it up
        window.onload = launch;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>$PMUSH LILLY PAD HOP</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        :root {
            --accent: #00ffcc;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Press Start 2P', system-ui;
            color: white;
            touch-action: none;
        }
        
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #001122, #000000);
        }
        
        canvas {
            display: block;
            background: #001122;
            max-width: 100vw;
            max-height: 100vh;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.4);
        }
        
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        
        .screen {
            pointer-events: auto;
            background: rgba(0, 17, 34, 0.95);
            border: 8px solid var(--accent);
            border-radius: 20px;
            padding: 30px 20px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.6);
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 20px;
            color: var(--accent);
            text-shadow: 0 0 15px var(--accent);
        }
        
        button {
            font-family: 'Press Start 2P', system-ui;
            font-size: 18px;
            background: #001122;
            color: white;
            border: 6px solid var(--accent);
            padding: 15px 30px;
            margin: 10px;
            width: 100%;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
        }
        
        button:active {
            transform: scale(0.95);
            background: var(--accent);
            color: #001122;
        }
        
        .leaderboard {
            max-height: 320px;
            overflow-y: auto;
            background: #001122;
            border: 4px solid var(--accent);
            padding: 10px;
            margin: 15px 0;
            text-align: left;
            font-size: 14px;
        }
        
        .leaderboard li {
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid #003344;
        }
        
        .leaderboard li:last-child { border-bottom: none; }
        
        .score { color: var(--accent); }
        
        #pause-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 32px;
            background: none;
            border: none;
            color: white;
            z-index: 100;
            pointer-events: auto;
            text-shadow: 0 0 10px var(--accent);
            display: none;
        }
        
        .small-btn {
            font-size: 14px;
            padding: 10px 20px;
            width: auto;
            display: inline-block;
        }
        
        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 17, 34, 0.98);
            border: 8px solid var(--accent);
            padding: 25px;
            border-radius: 15px;
            width: 85%;
            max-width: 340px;
            z-index: 200;
            display: none;
        }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="canvas" width="400" height="700"></canvas>
        
        <!-- MAIN MENU -->
        <div id="main-menu" class="ui-overlay">
            <div class="screen">
                <h1>$PMUSH<br>LILLY PAD HOP</h1>
                <p style="font-size:12px; margin-bottom:30px; opacity:0.8;">TO THE MOON 🌕</p>
                
                <button id="btn-play">PLAY</button>
                <button id="btn-leaderboard">LEADERBOARD</button>
                <button id="btn-cap">CHOOSE CAP</button>
                <button id="btn-username">SET USERNAME</button>
                
                <div style="margin-top:40px; font-size:11px; opacity:0.6;">
                    HIGH SCORE: <span id="high-score-display" style="color:#00ffcc;">0</span>
                </div>
            </div>
        </div>
        
        <!-- CAP SELECT -->
        <div id="cap-screen" class="ui-overlay" style="display:none;">
            <div class="screen">
                <h1>CHOOSE CAP</h1>
                <div style="display:flex; justify-content:space-around; flex-wrap:wrap; gap:12px; margin:25px 0;">
                    <div onclick="selectCap(0)" style="cursor:pointer; text-align:center;">
                        <div id="cap-preview-0" style="width:68px;height:68px;margin:0 auto 8px; border:4px solid #00ffcc; border-radius:50%; background:#4b9cd3;"></div>
                        <div style="font-size:11px;">BLUE</div>
                    </div>
                    <div onclick="selectCap(1)" style="cursor:pointer; text-align:center;">
                        <div id="cap-preview-1" style="width:68px;height:68px;margin:0 auto 8px; border:4px solid #00ffcc; border-radius:50%; background:#ff6699;"></div>
                        <div style="font-size:11px;">PINK</div>
                    </div>
                    <div onclick="selectCap(2)" style="cursor:pointer; text-align:center;">
                        <div id="cap-preview-2" style="width:68px;height:68px;margin:0 auto 8px; border:4px solid #00ffcc; border-radius:50%; background:#ccff33;"></div>
                        <div style="font-size:11px;">LIME</div>
                    </div>
                    <div onclick="selectCap(3)" style="cursor:pointer; text-align:center;">
                        <div id="cap-preview-3" style="width:68px;height:68px;margin:0 auto 8px; border:4px solid #00ffcc; border-radius:50%; background:#aa66ff;"></div>
                        <div style="font-size:11px;">PURPLE</div>
                    </div>
                    <div onclick="selectCap(4)" style="cursor:pointer; text-align:center;">
                        <div id="cap-preview-4" style="width:68px;height:68px;margin:0 auto 8px; border:4px solid #00ffcc; border-radius:50%; background:#ffaa33;"></div>
                        <div style="font-size:11px;">ORANGE</div>
                    </div>
                    <div onclick="selectCap(5)" style="cursor:pointer; text-align:center;">
                        <div id="cap-preview-5" style="width:68px;height:68px;margin:0 auto 8px; border:4px solid #00ffcc; border-radius:50%; background:#33ffff;"></div>
                        <div style="font-size:11px;">CYAN</div>
                    </div>
                </div>
                
                <button onclick="backToMenu()" class="small-btn">BACK</button>
                <button onclick="startFromCap()" style="margin-left:10px;">START JUMPING</button>
            </div>
        </div>
        
        <!-- LEADERBOARD -->
        <div id="leaderboard-screen" class="ui-overlay" style="display:none;">
            <div class="screen">
                <h1>LEADERBOARD</h1>
                <div id="leaderboard-list" class="leaderboard">
                    <!-- populated by JS -->
                </div>
                <button onclick="backToMenu()" class="small-btn">BACK TO MENU</button>
            </div>
        </div>
        
        <!-- PAUSE MENU -->
        <div id="pause-menu" class="ui-overlay" style="display:none;">
            <div class="screen">
                <h1>PAUSED</h1>
                <button onclick="resumeGame()">RESUME</button>
                <button onclick="quitToMenu()">QUIT</button>
            </div>
        </div>
        
        <!-- GAME OVER -->
        <div id="gameover-screen" class="ui-overlay" style="display:none;">
            <div class="screen">
                <h1>GAME OVER</h1>
                <div style="margin:20px 0; font-size:18px;">
                    SCORE: <span id="final-score" style="color:#00ffcc; font-size:24px;">0</span>
                </div>
                
                <div style="margin-bottom:20px;">
                    <input id="username-input" type="text" placeholder="YOUR NAME" maxlength="12" 
                           style="width:100%; padding:12px; font-size:16px; background:#001122; border:4px solid #00ffcc; color:white; text-align:center;">
                </div>
                
                <button onclick="submitScore()">SUBMIT SCORE</button>
                <button onclick="viewLeaderboardFromOver()">VIEW LEADERBOARD</button>
                <button onclick="playAgain()">PLAY AGAIN</button>
                <button onclick="shareScore()" class="small-btn" style="margin-top:10px;">SHARE ON X</button>
                <button onclick="quitToMenu()" class="small-btn">MENU</button>
            </div>
        </div>
        
        <!-- Pause button -->
        <button id="pause-btn" onclick="pauseGame()">⏸</button>
    </div>

    <script>
        // =============================================
        // ALL VARIABLES AT TOP - ROCK SOLID
        // =============================================
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: true });
        
        const WIDTH = 400;
        const HEIGHT = 700;
        
        let gameState = 'menu'; // menu, playing, paused, gameover
        let score = 0;
        let highScore = 0;
        let username = 'Guest';
        let selectedCap = 0;
        
        // Player - true Doodle Jump physics
        let player = {
            x: WIDTH / 2,
            y: HEIGHT * 0.75,
            vx: 0,
            vy: 0,
            width: 44,
            height: 52,
            jetpackTime: 0,
            magnetTime: 0,
            shieldTime: 0,
            multiTime: 0,
            superBounce: 0,
            capColor: '#4b9cd3',
            trail: []
        };
        
        // World
        let platforms = [];
        let powerups = [];
        let enemies = [];
        let particles = [];
        let cameraY = 0;
        let maxHeightReached = 0;
        
        // Controls
        let movingLeft = false;
        let movingRight = false;
        
        // Background & difficulty
        let bgLevel = 0;
        let scrollTextX = WIDTH;
        let difficulty = 0;
        
        // Audio (simple Web Audio for polish)
        let audioCtx;
        
        // Leaderboard
        let leaderboard = [];
        
        // Timers
        let lastTime = 0;
        let frame = 0;
        let gameLoopId = null;
        
        // Touch helpers
        let touchScaleX = 1;
        let touchScaleY = 1;
        
        // Cap palette (6 options)
        const capColors = [
            '#4b9cd3', // 0 blue
            '#ff6699', // 1 pink
            '#ccff33', // 2 lime
            '#aa66ff', // 3 purple
            '#ffaa33', // 4 orange
            '#33ffff'  // 5 cyan
        ];
        
        // =============================================
        // LOCALSTORAGE
        // =============================================
        function loadData() {
            const savedUser = localStorage.getItem('pmush_username');
            if (savedUser) username = savedUser;
            
            const savedLB = localStorage.getItem('pmush_leaderboard');
            if (savedLB) leaderboard = JSON.parse(savedLB);
            
            const savedHS = localStorage.getItem('pmush_highscore');
            if (savedHS) highScore = parseInt(savedHS);
            
            document.getElementById('high-score-display').textContent = highScore;
        }
        
        function saveLeaderboard() {
            leaderboard.sort((a, b) => b.score - a.score);
            leaderboard = leaderboard.slice(0, 10);
            localStorage.setItem('pmush_leaderboard', JSON.stringify(leaderboard));
            localStorage.setItem('pmush_highscore', highScore);
        }
        
        // Simple sound helper
        function playSound(freq, duration, type = 'sine') {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain).connect(audioCtx.destination);
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.type = type;
            gain.gain.value = 0.3;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.stop(audioCtx.currentTime + duration);
        }
        
        // =============================================
        // INIT GAME - 100% reliable instant start
        // =============================================
        function initGame() {
            player.x = WIDTH / 2;
            player.y = HEIGHT * 0.72;
            player.vx = 0;
            player.vy = -21; // strong first bounce
            player.jetpackTime = 0;
            player.magnetTime = 0;
            player.shieldTime = 0;
            player.multiTime = 0;
            player.superBounce = 0;
            player.trail = [];
            
            cameraY = 0;
            score = 0;
            maxHeightReached = player.y;
            bgLevel = 0;
            scrollTextX = WIDTH;
            difficulty = 0;
            
            platforms = [];
            powerups = [];
            enemies = [];
            particles = [];
            
            // Initial platforms (Doodle Jump style)
            for (let i = 0; i < 17; i++) {
                const plat = {
                    x: Math.random() * (WIDTH - 90) + 20,
                    y: HEIGHT - (i * 44) - 30,
                    w: 88,
                    vx: 0,
                    breakable: Math.random() < 0.12,
                    breakTime: 0,
                    active: true
                };
                // Early moving platforms after difficulty threshold
                if (i > 8 && Math.random() < 0.22) plat.vx = (Math.random() > 0.5 ? 1.8 : -1.8);
                platforms.push(plat);
            }
            
            // First power-up
            powerups.push({
                x: platforms[4].x + 24,
                y: platforms[4].y - 28,
                type: 'coin',
                collected: false
            });
            
            movingLeft = false;
            movingRight = false;
            gameState = 'playing';
            
            document.getElementById('pause-btn').style.display = 'block';
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('cap-screen').style.display = 'none';
            document.getElementById('leaderboard-screen').style.display = 'none';
            document.getElementById('pause-menu').style.display = 'none';
            document.getElementById('gameover-screen').style.display = 'none';
            
            console.log('%c$PMUSH LILLY PAD HOP started instantly with upgraded Doodle Jump mechanics!', 'color:#00ffcc');
        }
        
        // =============================================
        // UPDATE - tuned Doodle Jump physics + progressive difficulty
        // =============================================
        function update() {
            if (gameState !== 'playing') return;
            
            frame++;
            
            // Difficulty scaling
            difficulty = Math.floor(score / 700);
            
            // Player physics - classic Doodle Jump feel
            player.vy += 0.52; // gravity
            player.x += player.vx;
            
            // Side wrap
            if (player.x < -player.width / 2) player.x = WIDTH + player.width / 2;
            if (player.x > WIDTH + player.width / 2) player.x = -player.width / 2;
            
            // Touch movement
            const speed = 7.2;
            if (movingLeft) player.vx = Math.max(player.vx - 1.4, -speed);
            if (movingRight) player.vx = Math.min(player.vx + 1.4, speed);
            if (!movingLeft && !movingRight) player.vx *= 0.86;
            
            // Power timers
            if (player.jetpackTime > 0) {
                player.jetpackTime--;
                player.vy = Math.max(player.vy - 2.8, -22);
            }
            if (player.magnetTime > 0) player.magnetTime--;
            if (player.shieldTime > 0) player.shieldTime--;
            if (player.multiTime > 0) player.multiTime--;
            
            // Trail for cool velocity effect
            if (Math.abs(player.vy) > 8 || player.jetpackTime > 0) {
                player.trail.push({
                    x: player.x,
                    y: player.y + player.height / 2,
                    life: 12
                });
            }
            player.trail = player.trail.filter(t => { t.life--; return t.life > 0; });
            
            // Platforms
            player.onGround = false;
            for (let i = platforms.length - 1; i >= 0; i--) {
                let p = platforms[i];
                if (!p.active) continue;
                
                // Move moving platforms
                if (p.vx !== 0) {
                    p.x += p.vx;
                    if (p.x < 10 || p.x + p.w > WIDTH - 10) p.vx *= -1;
                }
                
                // Collision (only when falling)
                const screenY = p.y - cameraY;
                if (
                    player.vy > 0 &&
                    player.x + player.width / 2 > p.x &&
                    player.x - player.width / 2 < p.x + p.w &&
                    player.y + player.height / 2 > p.y &&
                    player.y + player.height / 2 - player.vy < p.y
                ) {
                    player.y = p.y - player.height / 2;
                    const bounce = player.superBounce > 0 ? -29 : -19.8 - (score / 1100);
                    player.vy = bounce;
                    player.superBounce = Math.max(0, player.superBounce - 1);
                    player.onGround = true;
                    
                    playSound(280 + Math.random() * 80, 0.08, 'triangle'); // jump sound
                    
                    // Particles
                    for (let k = 0; k < 18; k++) {
                        particles.push({
                            x: player.x + (Math.random() * 34 - 17),
                            y: player.y + player.height / 2 + 4,
                            vx: (Math.random() - 0.5) * 5,
                            vy: Math.random() * 4 + 3,
                            life: 24,
                            color: '#00ff99'
                        });
                    }
                    
                    // Breakable platforms
                    if (p.breakable) {
                        p.breakTime = 18;
                    }
                }
                
                // Breakable countdown
                if (p.breakTime > 0) {
                    p.breakTime--;
                    if (p.breakTime <= 0) p.active = false;
                }
                
                // Cleanup
                if (p.y > cameraY + HEIGHT + 120) platforms.splice(i, 1);
            }
            
            // Generate new platforms (progressively harder)
            const spacing = 40 + Math.min(38, difficulty * 2.2);
            const baseWidth = Math.max(42, 88 - difficulty * 1.6);
            while (platforms.length < 19) {
                const lastY = platforms.length ? Math.min(...platforms.map(p => p.y)) : cameraY - 40;
                const plat = {
                    x: Math.random() * (WIDTH - baseWidth - 20) + 15,
                    y: lastY - spacing - Math.random() * 12,
                    w: baseWidth + Math.random() * 14,
                    vx: (difficulty > 8 && Math.random() < 0.35) ? (Math.random() > 0.5 ? 2.1 : -2.1) : 0,
                    breakable: Math.random() < 0.18,
                    breakTime: 0,
                    active: true
                };
                platforms.push(plat);
                
                // Random power-up
                if (Math.random() < 0.19) {
                    const types = ['coin', 'coin', 'jetpack', 'magnet', 'spring', 'shield'];
                    powerups.push({
                        x: plat.x + plat.w / 2,
                        y: plat.y - 32,
                        type: types[Math.floor(Math.random() * types.length)],
                        collected: false
                    });
                }
                
                // Occasional enemy (spiky mushroom)
                if (difficulty > 5 && Math.random() < 0.11) {
                    enemies.push({
                        x: plat.x + plat.w / 2,
                        y: plat.y - 22,
                        vx: 1.6 * (Math.random() > 0.5 ? 1 : -1),
                        active: true
                    });
                }
            }
            
            // Power-up collection
            for (let i = powerups.length - 1; i >= 0; i--) {
                const pu = powerups[i];
                if (pu.collected) continue;
                
                let dx = player.x - pu.x;
                let dy = player.y + 12 - pu.y;
                let dist = Math.hypot(dx, dy);
                
                if (player.magnetTime > 0 && pu.type === 'coin' && dist < 130) {
                    pu.x += dx * 0.22;
                    pu.y += dy * 0.22;
                }
                
                if (dist < 38) {
                    pu.collected = true;
                    playSound(620, 0.12);
                    
                    if (pu.type === 'coin') {
                        const points = player.multiTime > 0 ? 60 : 28;
                        score += points;
                        for (let k = 0; k < 12; k++) {
                            particles.push({x: pu.x, y: pu.y, vx: (Math.random()-0.5)*7, vy: (Math.random()-0.5)*7-3, life: 20, color: '#ffee44'});
                        }
                    } else if (pu.type === 'jetpack') {
                        player.jetpackTime = 260;
                    } else if (pu.type === 'magnet') {
                        player.magnetTime = 420;
                    } else if (pu.type === 'spring') {
                        player.superBounce = 2;
                    } else if (pu.type === 'shield') {
                        player.shieldTime = 520;
                    }
                }
            }
            
            // Enemies
            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                if (!e.active) continue;
                e.x += e.vx;
                if (e.x < 20 || e.x > WIDTH - 20) e.vx *= -1;
                
                const ex = e.x;
                const ey = e.y - cameraY;
                const px = player.x;
                const py = player.y - cameraY;
                
                if (Math.hypot(px - ex, py + 10 - ey) < 32) {
                    if (player.shieldTime > 0) {
                        player.shieldTime = 0;
                        e.active = false;
                    } else {
                        endGame();
                        return;
                    }
                }
                
                if (e.y > cameraY + HEIGHT + 80) enemies.splice(i, 1);
            }
            
            // Camera & scoring (constant upward progression feel)
            if (player.vy < 0 && player.y < HEIGHT * 0.28) {
                const scroll = HEIGHT * 0.28 - player.y;
                player.y = HEIGHT * 0.28;
                cameraY -= scroll;
                const newScore = Math.floor(-cameraY / 2.8);
                if (newScore > score) score = newScore;
            }
            
            // Background level change every 2500
            const newBg = Math.floor(score / 2500);
            if (newBg > bgLevel) {
                bgLevel = newBg;
                playSound(440, 0.3, 'sine');
            }
            
            // Particles update
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.18;
                p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }
            
            // Scroll text
            scrollTextX -= 3.2;
            if (scrollTextX < -380) scrollTextX = WIDTH + 120;
            
            // Game over if fall too far
            if (player.y > cameraY + HEIGHT + 110) {
                endGame();
                return;
            }
        }
        
        // =============================================
        // DRAW - upgraded visuals
        // =============================================
        function draw() {
            ctx.clearRect(0, 0, WIDTH, HEIGHT);
            
            // Dynamic background
            const hueShift = (bgLevel * 38) % 360;
            const grad = ctx.createLinearGradient(0, 0, 0, HEIGHT);
            grad.addColorStop(0, `hsl(${200 + hueShift}, 85%, 14%)`);
            grad.addColorStop(1, `hsl(${230 + hueShift}, 90%, 6%)`);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, WIDTH, HEIGHT);
            
            // Stars / moon particles
            ctx.fillStyle = '#ffffff';
            for (let i = 0; i < 48; i++) {
                const x = (i * 27 + frame * 0.4) % WIDTH;
                const y = ((i * 19) % (HEIGHT + cameraY * 0.08)) - cameraY * 0.08;
                ctx.globalAlpha = 0.7 + Math.sin(frame / 8 + i) * 0.3;
                ctx.fillRect(x, y, i % 7 === 0 ? 3 : 1.5, i % 7 === 0 ? 3 : 1.5);
            }
            ctx.globalAlpha = 1;
            
            // Scrolling moon text
            ctx.font = 'bold 23px "Press Start 2P"';
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.shadowBlur = 18;
            ctx.shadowColor = '#00ffdd';
            ctx.fillText('$PMUSH TO THE MOON 🌕', scrollTextX, 92);
            ctx.shadowBlur = 0;
            
            // Platforms
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#11ff88';
            for (let p of platforms) {
                if (!p.active) continue;
                const sy = p.y - cameraY;
                if (sy < -50 || sy > HEIGHT + 50) continue;
                
                ctx.fillStyle = p.breakable ? '#ffaa33' : '#00dd77';
                ctx.beginPath();
                ctx.ellipse(p.x + p.w / 2, sy + 9, p.w / 2 + 5, 15, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#008844';
                ctx.beginPath();
                ctx.ellipse(p.x + p.w / 2, sy + 9, p.w / 2, 11, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Moving platform highlight
                if (p.vx !== 0) {
                    ctx.fillStyle = '#ffee88';
                    ctx.fillRect(p.x + 6, sy + 4, p.w - 12, 4);
                }
            }
            ctx.shadowBlur = 0;
            
            // Enemies (spiky mushrooms)
            for (let e of enemies) {
                if (!e.active) continue;
                const sy = e.y - cameraY;
                ctx.fillStyle = '#ff2244';
                ctx.beginPath();
                ctx.arc(e.x, sy, 13, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 18px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('⚡', e.x, sy + 6);
            }
            
            // Power-ups
            for (let pu of powerups) {
                if (pu.collected) continue;
                const sy = pu.y - cameraY;
                if (sy < -50 || sy > HEIGHT + 50) continue;
                
                if (pu.type === 'coin') {
                    ctx.shadowBlur = 18;
                    ctx.shadowColor = '#ffee00';
                    ctx.fillStyle = '#ffee00';
                    ctx.beginPath();
                    ctx.arc(pu.x, sy, 14, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#cc9900';
                    ctx.font = 'bold 20px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('¢', pu.x, sy + 7);
                } else if (pu.type === 'jetpack') {
                    ctx.fillStyle = '#ff5500';
                    ctx.fillRect(pu.x - 11, sy - 14, 22, 28);
                    ctx.fillStyle = '#ffee00';
                    ctx.fillRect(pu.x - 16, sy + 12, 32, 9);
                } else if (pu.type === 'magnet') {
                    ctx.strokeStyle = '#cc33ff';
                    ctx.lineWidth = 7;
                    ctx.beginPath();
                    ctx.arc(pu.x, sy, 17, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.fillStyle = '#cc33ff';
                    ctx.fillRect(pu.x - 7, sy - 7, 14, 14);
                } else if (pu.type === 'spring') {
                    ctx.fillStyle = '#00ffcc';
                    ctx.fillRect(pu.x - 9, sy - 6, 18, 26);
                    ctx.fillStyle = '#ffee00';
                    ctx.fillRect(pu.x - 14, sy + 18, 28, 8);
                } else if (pu.type === 'shield') {
                    ctx.strokeStyle = '#00ccff';
                    ctx.lineWidth = 5;
                    ctx.beginPath();
                    ctx.arc(pu.x, sy, 19, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }
            
            // Player trail
            ctx.globalAlpha = 0.6;
            for (let t of player.trail) {
                ctx.fillStyle = '#00ffcc';
                const sy = t.y - cameraY;
                ctx.fillRect(t.x - 6, sy, 12, 8);
            }
            ctx.globalAlpha = 1;
            
            // $PMUSH character with tilt & animation
            const py = player.y - cameraY;
            ctx.save();
            ctx.translate(player.x, py);
            const tilt = Math.max(-0.75, Math.min(0.75, player.vx * 0.028));
            ctx.rotate(tilt);
            
            // Robe
            ctx.fillStyle = '#6b2fc2';
            ctx.fillRect(-19, 18, 38, 28);
            ctx.fillStyle = '#9b5fe8';
            ctx.fillRect(-13, 21, 10, 18);
            
            // Stem
            ctx.fillStyle = '#f0f0d8';
            ctx.fillRect(-11, -9, 22, 32);
            
            // Cap
            ctx.fillStyle = player.capColor;
            ctx.beginPath();
            ctx.ellipse(0, -19, 27, 19, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Spots
            ctx.fillStyle = '#ffffff';
            ctx.beginPath(); ctx.arc(-13, -25, 4.5, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(13, -22, 3.8, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(-3, -14, 5.5, 0, Math.PI * 2); ctx.fill();
            
            // 3rd eye triangle
            ctx.shadowBlur = 16;
            ctx.shadowColor = '#ff66ff';
            ctx.fillStyle = '#ff66ff';
            ctx.beginPath();
            ctx.moveTo(-7, -35); ctx.lineTo(7, -35); ctx.lineTo(0, -24);
            ctx.closePath();
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Eye dot
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(-2, -30, 4, 4);
            
            // Pepe face
            ctx.fillStyle = '#222';
            ctx.fillRect(-14, -21, 8, 9);
            ctx.fillRect(6, -21, 8, 9);
            ctx.fillStyle = '#fff';
            ctx.fillRect(-12, -19, 3, 3);
            ctx.fillRect(8, -19, 3, 3);
            
            // Smirk
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 2.8;
            ctx.beginPath();
            ctx.moveTo(-10, -8);
            ctx.quadraticCurveTo(0, -4, 10, -8);
            ctx.stroke();
            
            // Jetpack fire
            if (player.jetpackTime > 0) {
                ctx.shadowBlur = 22;
                ctx.shadowColor = '#ff8800';
                ctx.fillStyle = frame % 3 === 0 ? '#ffee00' : '#ff4400';
                ctx.beginPath();
                ctx.moveTo(-14, 36);
                ctx.lineTo(-3, 54 + Math.sin(frame * 0.8) * 8);
                ctx.lineTo(14, 36);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
            
            ctx.restore();
            
            // HUD
            ctx.fillStyle = 'white';
            ctx.font = 'bold 24px "Press Start 2P"';
            ctx.textAlign = 'left';
            ctx.fillText(Math.floor(score) + '', 24, 48);
            
            if (player.multiTime > 0) {
                ctx.fillStyle = '#ffee00';
                ctx.font = '14px "Press Start 2P"';
                ctx.fillText('×2', WIDTH - 110, 48);
            }
            if (player.shieldTime > 0) {
                ctx.fillStyle = '#00ccff';
                ctx.fillText('🛡️', WIDTH - 72, 48);
            }
            if (player.magnetTime > 0) ctx.fillText('🧲', WIDTH - 42, 48);
            
            ctx.font = '10px "Press Start 2P"';
            ctx.fillStyle = '#00ffcc';
            ctx.textAlign = 'right';
            ctx.fillText(username.toUpperCase(), WIDTH - 18, 48);
        }
        
        // =============================================
        // GAME LOOP
        // =============================================
        function loop(timestamp) {
            if (!lastTime) lastTime = timestamp;
            if (timestamp - lastTime > 15) {
                update();
                draw();
                lastTime = timestamp;
            }
            gameLoopId = requestAnimationFrame(loop);
        }
        
        function endGame() {
            cancelAnimationFrame(gameLoopId);
            gameState = 'gameover';
            document.getElementById('pause-btn').style.display = 'none';
            
            if (score > highScore) highScore = score;
            
            document.getElementById('final-score').textContent = Math.floor(score);
            document.getElementById('username-input').value = username;
            document.getElementById('gameover-screen').style.display = 'flex';
        }
        
        function submitScore() {
            username = (document.getElementById('username-input').value.trim() || 'Guest').slice(0, 12);
            localStorage.setItem('pmush_username', username);
            leaderboard.push({ name: username, score: Math.floor(score) });
            saveLeaderboard();
            document.getElementById('gameover-screen').style.display = 'none';
            showLeaderboard();
        }
        
        function playAgain() {
            document.getElementById('gameover-screen').style.display = 'none';
            initGame();
            lastTime = 0;
            requestAnimationFrame(loop);
        }
        
        // UI handlers
        function startGame() {
            initGame();
            lastTime = 0;
            requestAnimationFrame(loop);
        }
        
        function startFromCap() {
            player.capColor = capColors[selectedCap];
            document.getElementById('cap-screen').style.display = 'none';
            startGame();
        }
        
        function selectCap(n) {
            selectedCap = n;
            document.querySelectorAll('#cap-screen div[style*="cursor:pointer"]').forEach((el, i) => {
                el.style.border = i === n ? '8px solid #00ffcc' : '4px solid #00ffcc';
            });
        }
        
        function backToMenu() {
            document.getElementById('cap-screen').style.display = 'none';
            document.getElementById('leaderboard-screen').style.display = 'none';
            document.getElementById('main-menu').style.display = 'flex';
        }
        
        function pauseGame() {
            if (gameState !== 'playing') return;
            gameState = 'paused';
            cancelAnimationFrame(gameLoopId);
            document.getElementById('pause-btn').style.display = 'none';
            document.getElementById('pause-menu').style.display = 'flex';
        }
        
        function resumeGame() {
            document.getElementById('pause-menu').style.display = 'none';
            gameState = 'playing';
            document.getElementById('pause-btn').style.display = 'block';
            lastTime = 0;
            requestAnimationFrame(loop);
        }
        
        function quitToMenu() {
            cancelAnimationFrame(gameLoopId);
            gameState = 'menu';
            document.getElementById('pause-menu').style.display = 'none';
            document.getElementById('gameover-screen').style.display = 'none';
            document.getElementById('pause-btn').style.display = 'none';
            document.getElementById('main-menu').style.display = 'flex';
        }
        
        function showLeaderboard() {
            const container = document.getElementById('leaderboard-list');
            let html = '<ul style="list-style:none;padding:0;margin:0;">';
            leaderboard.forEach((entry, i) => {
                html += `<li><span>#${i+1} ${entry.name}</span><span class="score">${entry.score}</span></li>`;
            });
            if (leaderboard.length === 0) html += '<li style="text-align:center;padding:30px;opacity:0.6;">NO SCORES YET — BE THE FIRST!</li>';
            html += '</ul>';
            container.innerHTML = html;
            document.getElementById('leaderboard-screen').style.display = 'flex';
            document.getElementById('main-menu').style.display = 'none';
        }
        
        function viewLeaderboardFromOver() {
            document.getElementById('gameover-screen').style.display = 'none';
            showLeaderboard();
        }
        
        function shareScore() {
            const text = `I scored ${Math.floor(score)} in $PMUSH LILLY PAD HOP! 🌕 Beat me?`;
            window.open(`https://x.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank');
        }
        
        function handleTouch(e) {
            if (gameState !== 'playing') return;
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            touchScaleX = WIDTH / rect.width;
            
            for (let touch of e.changedTouches) {
                const tx = (touch.clientX - rect.left) * touchScaleX;
                if (tx < WIDTH / 2) {
                    movingLeft = true;
                    movingRight = false;
                } else {
                    movingRight = true;
                    movingLeft = false;
                }
            }
        }
        
        function handleTouchEnd(e) {
            if (gameState !== 'playing') return;
            e.preventDefault();
            movingLeft = false;
            movingRight = false;
        }
        
        function setUsername() {
            const name = prompt('ENTER NAME (max 12 chars)', username);
            if (name) username = name.trim().slice(0, 12);
            localStorage.setItem('pmush_username', username);
        }
        
        // Launch
        function launch() {
            canvas.width = WIDTH;
            canvas.height = HEIGHT;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            loadData();
            
            document.getElementById('btn-play').addEventListener('click', startGame);
            document.getElementById('btn-leaderboard').addEventListener('click', showLeaderboard);
            document.getElementById('btn-cap').addEventListener('click', () => {
                document.getElementById('main-menu').style.display = 'none';
                document.getElementById('cap-screen').style.display = 'flex';
            });
            document.getElementById('btn-username').addEventListener('click', setUsername);
            
            canvas.addEventListener('touchstart', handleTouch, { passive: false });
            canvas.addEventListener('touchmove', handleTouch, { passive: false });
            canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
            canvas.addEventListener('touchcancel', handleTouchEnd, { passive: false });
            
            document.getElementById('main-menu').style.display = 'flex';
            
            // Pre-draw to avoid any black flash
            ctx.fillStyle = '#001122';
            ctx.fillRect(0, 0, WIDTH, HEIGHT);
            ctx.fillStyle = '#00ffcc';
            ctx.font = 'bold 32px "Press Start 2P"';
            ctx.textAlign = 'center';
            ctx.fillText('$PMUSH', WIDTH / 2, HEIGHT / 2);
            
            console.log('%c✅ Upgraded $PMUSH LILLY PAD HOP ready - instant launch + Doodle Jump mechanics!', 'color:#00ffcc;font-size:13px');
        }
        
        window.onload = launch;
    </script>
</body>
</html>
